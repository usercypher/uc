[global]
pid = {ROOT}/var/run/php-fpm.pid
error_log = {ROOT}/var/log/php-fpm.log
daemonize = no

[www]
user = {USER}
group = {GROUP}
listen = {ROOT}/var/run/php-fpm.sock
listen.owner = {USER}
listen.group = {GROUP}
listen.mode = 0660

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3