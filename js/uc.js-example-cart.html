<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ElX – Example Usage</title>
  <script src="uc.js" defer></script>
  <style>


  </style>
</head>
<body style="padding: 1em;">
    
    <table width='100%'>
        <thead>
            <tr>
                <th width='25%'>Category</th>
                <th width='25%'>Product</th>
                <th class='price' width='15%'>Price</th>
                <th class='quantity' width='10%'>Quantity</th>
                <th class='price' width='15%'>Subtotal</th>
                <th width='10%'> </th>
            </tr>
        </thead>
        <tbody id="lines">
            
        </tbody>
    </table>
    <p>
        Total value: <span x-ref-grandtotal>0.00</span>
    </p>
    <button x-evt-click x-val-addline>Add product</button>
    <button x-evt-click x-val-save>Submit order</button>

    <!-- Load Script -->
<script>
(window.init = window.init || []).push(function () {
    ElX.init(document.body);
    function ProductModel(id, name, category, qty, price) {
        this.id = id;
        this.name = new ElX("product-" + id, name);
        this.category = new ElX("category-" + id, category);
        this.qty = new ElX("qty-" + id, qty);
        this.price = new ElX("price-" + id, price);
        this.subtotal = new ElX("subtotal-" + id, qty * price);

        this.qty.tap(ProductModel.prototype.subtotalCalc, this);
        this.price.tap(ProductModel.prototype.subtotalCalc, this);
    }    
    ProductModel.prototype.subtotalCalc = function () {
        this.subtotal.val(this.price.value() * this.qty.value());
    };
    
    function Category() {}
    Category.prototype.options = function () {
        return ["Cars", "Planes"];
    };
    Category.prototype.yield = function (id) {
        return this.el = El(this.el || "select", [
            ["x-evt-input"],
            ["x-val-category-" + id, "$this.value"]
        ],
            (function (that) {
                var children = [];
                var options = that.options();
                for (var i = 0, ilen = options.length; i < ilen; i++) {
                    var opt = options[i];
                    children.push(El("option", [["value", opt]], opt));
                }
                return children;
            })(this)
        );

    };

    function Product(product) {
        this.product = product;

        product.price.tap(Product.prototype.priceVal, this);
        product.name.tap(Product.prototype.updatePrice, this);
        product.category.tap(Product.prototype.updateName, this);
    }
    Product.prototype.tpl = function () {
        return productTpl;
    };
    Product.prototype.options = function () {
        return [
            {name: "1948 Porsche 356-A Roadster", category: "Cars", price: 53.90},
            {name: "1948 Porsche Type 356 Roadster", category: "Cars", price: 62.16},
            {name: "1900s Vintage Bi-Plane", category: "Planes", price: 34.25},
            {name: "1900s Vintage Tri-Plane", category: "Planes", price: 36.23}
        ];
    };
    Product.prototype.priceVal = function (current) {
        this.product.price.dom(["textContent"], current.toFixed(2));
    };
    Product.prototype.updatePrice = function (current) {
        var that = this;
        var options = that.options();
        for (var i = 0, ilen = options.length; i < ilen; i++) {
            var opt = options[i];
            if (opt.name === current) {
                that.product.price.val(opt.price);
            }
        }
    };
    Product.prototype.updateName = function (current) {
        var that = this;
        var found = false;
        var options = that.options();
        for (var i = 0, ilen = options.length; i < ilen; i++) {
            var opt = options[i];
            if (!found && opt.category === current) {
                that.product.name.val(opt.name);
                that.yield(that.product.id)
                found = true;
            }
        }
    };
    Product.prototype.yield = function (id) {
        var that = this;
        return this.el = El(this.el || "select", [
            ["x-evt-input"],
            ["x-val-product-" + id, "$this.value"]
        ], 
            (function (that) {
                var children = [];
                var options = that.options();
                for (var i = 0, ilen = options.length; i < ilen; i++) {
                    var opt = options[i];
                    if (opt.category === that.product.category.value()) {
                        children.push(El("option", [["value", opt.name]], opt.name));
                    }
                }
                return children;
            })(this)
        );
    };

    function Line(product) {
        this.product = product;
        this.categoryComponent = new Category();
        this.productComponent = new Product(product);

        this.product.subtotal.tap(Line.prototype.subtotalVal, this);
    }
    Line.prototype.subtotalVal = function (current) {
        this.product.subtotal.dom(["textContent"], current.toFixed(2));
    };
    Line.prototype.yield = function () {
        var el = El("tr", [
            ["id", this.product.id]
        ],
            El("td", null, this.categoryComponent.yield(this.product.id)),
            El("td", null, this.productComponent.yield(this.product.id)),
            El("td", null,
                El("span", [
                    ["x-ref-price-" + this.product.id],
                ], this.product.price.value().toFixed(2))
            ),
            El("td", null,
                El("input", [
                    ["type", "number"],
                    ["x-ref-qty-" + this.product.id],
                    ["x-evt-input"],
                    ["x-val-qty-" + this.product.id, "$this.value"],
                    ["value", this.product.qty.value()],
                ])
            ),
            El("td", null,
                El("span", [
                    ["x-ref-subtotal-" + this.product.id],
                ], this.product.subtotal.value().toFixed(2))
            ),
            El("td", null,
                El("a", [
                    ["x-evt-click.prevent"],
                    ["x-val-removeline", this.product.id]
                ], "Remove")
            ),
        );
        ElX.init(el);
        return this.el = el;
    };

    function Cart() {
        this.lines = {};
        this.id = 0;
        this.el = El("#lines");
        this.grandtotal = new ElX("grandtotal");

        this.grandtotal.tap(Cart.prototype.grandtotalVal, this);

        ElX.tap("addline", Cart.prototype.addline, this);
        ElX.tap("removeline", Cart.prototype.removeline, this);
        ElX.tap("save", Cart.prototype.save, this);
    }
    Cart.prototype.addline = function () {
        var product = new ProductModel(this.id, "1948 Porsche 356-A Roadster", "Cars", 1, 53.90);
        product.subtotal.tap(Cart.prototype.grandtotalCalc, this);
    
        var line = new Line(product);
        this.lines[this.id] = line;
        El.buffer("append", this.el, line.yield(), 50);
        this.grandtotalCalc();

        this.id++;
    };
    Cart.prototype.removeline = function (current) {
        var id = Number(current);
        El.remove(this.lines[id].el);
        delete this.lines[id];
        ElX.prune();
        this.grandtotalCalc();
    };
    Cart.prototype.save = function () {
        var products = [];
        for (var key in this.lines) {
            if (!this.lines.hasOwnProperty(key)) continue;
            products.push({
                productName: this.lines[key].product.name.value(),
                quantity: this.lines[key].product.qty.value()
            });
        }
        alert(JSON.stringify(products));
    };
    Cart.prototype.grandtotalVal = function (current) {
        this.grandtotal.dom(["textContent"], current.toFixed(2));
    };
    Cart.prototype.grandtotalCalc = Util.debounce(function () {
        var grandtotal = 0;
        for (var key in this.lines) {
            if (!this.lines.hasOwnProperty(key)) continue;
            grandtotal += this.lines[key].product.subtotal.value();
        }
        this.grandtotal.val(grandtotal);
    },50);

    var cart = new Cart;
    for (var i = 0; i < 1000; i++) {
        cart.addline();
    }
});
</script>

</body>
</html>
