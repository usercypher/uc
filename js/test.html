<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Scroller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .panel h2 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
            width: 100%;
        }

        button:hover {
            background: #0052a3;
        }

        #scroller {
            height: 500px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow-y: auto;
            position: relative;
            background: white;
        }

        .item {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .item:hover {
            background: #f9f9f9;
        }

        .item-content {
            flex: 1;
        }

        .item-id {
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }

        .item-detail {
            font-size: 12px;
            color: #999;
        }

        .item-index {
            color: #ccc;
            font-size: 12px;
            margin-left: 10px;
        }

        .stats {
            margin-top: 15px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
        }

        textarea {
            height: 120px;
            font-size: 11px;
        }

        .error {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
    <script src="uc.js" defer></script>
</head>
<body>
    <div id="root"></div>

    <script>
        (window.init = window.init || []).push(function () {

            function VirtualScroller(options) {
                this.items = options.items || [];
                this.itemHeight = options.itemHeight || 60;
                this.template = options.template || this.defaultTemplate;
                this.buffer = options.buffer || 5;
                this.scrollTop = 0;
                this.visibleRange = { start: 0, end: 0 };
                this.init();
            }

            VirtualScroller.prototype.init = function() {
                this.scrollContainer = El("#scroller");
                this.contentWrapper = El("div", [["style", "position: relative;"]]);
                this.spacer = El("div", [["style", "position: absolute; top: 0; left: 0; width: 1px; pointer-events: none;"]]);
                this.viewport = El("div", [["style", "position: absolute; top: 0; left: 0; width: 100%;"]]);

                El.insert("append", this.contentWrapper, this.spacer);
                El.insert("append", this.contentWrapper, this.viewport);
                El.insert("inner", this.scrollContainer, this.contentWrapper);

                this.updateDimensions();
                this.bindEvents();
                this.render();
            };

            VirtualScroller.prototype.updateDimensions = function() {
                var containerHeight = this.scrollContainer.clientHeight;
                this.visibleCount = Math.ceil(containerHeight / this.itemHeight) + this.buffer;
                this.totalHeight = this.items.length * this.itemHeight;
                this.spacer.style.height = this.totalHeight + 'px';
            };

            VirtualScroller.prototype.bindEvents = function() {
                var self = this;
                this.scrollContainer.addEventListener('scroll', function() {
                    self.onScroll();
                });
                window.addEventListener('resize', function() {
                    self.updateDimensions();
                    self.render();
                });
            };

            VirtualScroller.prototype.onScroll = function() {
                this.scrollTop = this.scrollContainer.scrollTop;
                this.render();
            };

            VirtualScroller.prototype.render = function() {
                var startIndex = Math.max(0, Math.floor(this.scrollTop / this.itemHeight) - this.buffer);
                var endIndex = Math.min(this.items.length, startIndex + this.visibleCount);

                this.visibleRange = { start: startIndex, end: endIndex };

                var offsetTop = startIndex * this.itemHeight;
                this.viewport.style.transform = 'translateY(' + offsetTop + 'px)';

                El.clear(this.viewport);

                for (var i = startIndex; i < endIndex; i++) {
                    var itemEl = this.template(this.items[i], i);
                    El.insert("append", this.viewport, itemEl);
                }
            };

            VirtualScroller.prototype.defaultTemplate = function(item, index) {
                return El("div", [["class", "item"]], [
                    El("div", [["class", "item-content"]], [
                        El("div", [["class", "item-id"]], item.id || "Item " + (index + 1)),
                        El("div", [["class", "item-detail"]], item.value || item.name || "No data")
                    ]),
                    El("div", [["class", "item-index"]], "#" + (index + 1))
                ]);
            };

            VirtualScroller.prototype.setItems = function(items) {
                this.items = items;
                this.scrollTop = 0;
                this.scrollContainer.scrollTop = 0;
                this.updateDimensions();
                this.render();
            };

            VirtualScroller.prototype.getStats = function() {
                return {
                    totalItems: this.items.length,
                    visibleItems: this.visibleRange.end - this.visibleRange.start,
                    renderedStart: this.visibleRange.start + 1,
                    renderedEnd: this.visibleRange.end
                };
            };

            function App() {
                this.items = [];
                this.scroller = null;
                this.templateFn = null;
                this.render();
            }

            App.prototype.render = function() {
                var self = this;
                var appEl = El("div", [["class", "app-container"]], [
                    El("div", [["class", "panel"]], [
                        El("h2", [], "Configuration"),
                        El("div", [["class", "input-group"]], [
                            El("label", [], "Items (JSON Array):"),
                            El("textarea", [["id", "itemsInput"], ["placeholder", '[{"id":"item1","value":"value1"},{"id":"item2","value":"value2"}]']], "")
                        ]),
                        El("div", [["class", "input-group"]], [
                            El("label", [], "Custom Template (JavaScript Function):"),
                            El("textarea", [["id", "templateInput"], ["placeholder", "function(item, index) { return El('div', [['class', 'item']], item.id); }"]], "")
                        ]),
                        El("button", [["id", "loadBtn"]], "Load Items"),
                        El("div", [["id", "error"], ["class", "error"]], ""),
                        El("div", [["id", "stats"], ["class", "stats"]], "Ready")
                    ]),
                    El("div", [["class", "panel"]], [
                        El("h2", [], "Virtual Scroller Preview"),
                        El("div", [["id", "scroller"]], "")
                    ])
                ]);

                El.insert("inner", El("#root"), appEl);

                this.scroller = new VirtualScroller({
                    items: [],
                    itemHeight: 60,
                    template: function(item, index) {
                        return El("div", [["class", "item"]], [
                            El("div", [["class", "item-content"]], [
                                El("div", [["class", "item-id"]], item.id || "Item " + (index + 1)),
                                El("div", [["class", "item-detail"]], item.value || item.name || "No data")
                            ]),
                            El("div", [["class", "item-index"]], "#" + (index + 1))
                        ]);
                    }
                });

                this.templateFn = this.scroller.template;

                document.getElementById("loadBtn").addEventListener('click', function() {
                    self.loadItems();
                });

                document.getElementById("itemsInput").addEventListener('keydown', function(e) {
                    if (e.ctrlKey && e.key === 'Enter') {
                        self.loadItems();
                    }
                });
            };

            App.prototype.loadItems = function() {
                var itemsInput = document.getElementById("itemsInput").value;
                var templateInput = document.getElementById("templateInput").value;
                var errorDiv = document.getElementById("error");
                var statsDiv = document.getElementById("stats");

                errorDiv.textContent = "";

                try {
                    this.items = JSON.parse(itemsInput || "[]");
                    if (!Array.isArray(this.items)) {
                        throw new Error("Items must be an array");
                    }
                } catch (e) {
                    errorDiv.textContent = "Invalid items JSON: " + e.message;
                    return;
                }

                if (templateInput.trim()) {
                    try {
                        this.templateFn = eval("(" + templateInput + ")");
                        if (typeof this.templateFn !== 'function') {
                            throw new Error("Template must be a function");
                        }
                    } catch (e) {
                        errorDiv.textContent = "Invalid template: " + e.message;
                        return;
                    }
                }

                this.scroller.template = this.templateFn;
                this.scroller.setItems(this.items);
                this.updateStats();
            };

            App.prototype.updateStats = function() {
                var stats = this.scroller.getStats();
                var statsDiv = document.getElementById("stats");
                statsDiv.innerHTML = '<strong>Statistics:</strong><br>Total Items: ' + stats.totalItems + '<br>Visible Items: ' + stats.visibleItems + '<br>Rendering: #' + stats.renderedStart + ' - #' + stats.renderedEnd;
            };

            new App();
        });
    </script>
</body>
</html>
